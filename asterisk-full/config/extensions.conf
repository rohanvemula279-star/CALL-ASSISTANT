; Asterisk dialplan — full AI voice conversation
; This file goes to /etc/asterisk/extensions.conf
;
; Inbound: a caller dials in. We answer, record their first utterance,
; POST it to /transcribe, send the transcript to /chat, TTS the reply
; via /speak, and stream the resulting WAV back to the caller. Loop
; until the caller hangs up.
;
; Outbound: place a call to a configured number, run the same loop.
; Used when the AI wants to return a missed call.
;
; Note: this dialplan uses System() calls to curl the FastAPI service
; for simplicity. For production, prefer AGI scripts (see agi/) and
; convert the I/O to chan_websocket / res_ari.

[general]
static=yes
writeprotect=no
autofallthrough=yes
clearglobalvars=no

[globals]
AIAPP_URL=http://app:8000
AIAPP_TRANSCRIBE=/transcribe
AIAPP_CHAT=/chat
AIAPP_SPEAK=/speak
AIAPP_DIR=/var/lib/asterisk/ai
WAV_DIR=/var/lib/asterisk/wav

; ===================
;  Inbound AI answer
; ===================
[ai-inbound]
exten => s,1,NoOp(Inbound AI call from ${CALLERID(num)})
 same => n,Set(CHANNEL(hangup_handler_push)=1)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Goto(ai-loop,s,1)

; ====================
;  AI conversation loop
; ====================
[ai-loop]
exten => s,1,NoOp(AI conversation loop)
 same => n,Set(RECORD_ID=${UNIQUEID})
 same => n,Set(RECORD_PATH=${AIAPP_DIR}/${RECORD_ID}.wav)
 ; Up to 8s of speech, terminate on silence (300ms).
 same => n,Record(${RECORD_PATH},0,8,qx,3)
 same => n,GotoIf($["${RECORD_STATUS}" = "ERROR"]?ai-bye,s,1)
 same => n,Set(REPLY_FILE=${AIAPP_DIR}/reply_${RECORD_ID}.wav)
 ; --- Transcribe ---
 same => n,Set(TRANSCRIPT=${
        SHELL(curl -s -X POST -F "audio=@${RECORD_PATH}" ${AIAPP_URL}${AIAPP_TRANSCRIBE} | python3 -c 'import sys,json; print(json.load(sys.stdin)["text"])')
    })
 same => n,GotoIf($["${TRANSCRIPT}" = ""]?ai-bye,s,1)
 ; --- Chat ---
 same => n,Set(REPLY_TEXT=${
        SHELL(curl -s -X POST -H 'Content-Type: application/json' -d '{
            "call_id": "${RECORD_ID}",
            "caller":   "${CALLERID(num)}",
            "message":  "${TRANSCRIPT}"
        }' ${AIAPP_URL}${AIAPP_CHAT} | python3 -c 'import sys,json; print(json.load(sys.stdin)["reply"])')
    })
 ; --- Speak ---
 same => n,Set(REPLY_URL=${
        SHELL(curl -s -X POST -H 'Content-Type: application/json' -d '{
            "text": "${REPLY_TEXT}"
        }' ${AIAPP_URL}${AIAPP_SPEAK} | python3 -c 'import sys,json; print(json.load(sys.stdin)["audio_path"])')
    })
 same => n,GotoIf($["${REPLY_URL}" = ""]?ai-bye,s,1)
 ; --- Stream the WAV back ---
 same => n,System(wget -q -O ${REPLY_FILE} ${REPLY_URL})
 same => n,ControlPlayback(${REPLY_FILE},5000,*,skip)
 same => n,Goto(ai-loop,s,1)

exten => i,1,Goto(ai-loop,s,1)
exten => t,1,Goto(ai-bye,s,1)

[ai-bye]
exten => s,1,NoOp(Ending AI conversation)
 same => n,Playback(goodbye)
 same => n,Hangup()

; ====================
;  Outbound (callback)
; ====================
[ai-outbound]
exten => _X.,1,NoOp(AI calling ${EXTEN})
 same => n,Set(CDR_PROP(disable)=1)
 same => n,Dial(PJSIP/${EXTEN}@ai-bridge,60,tT)
 same => n,Hangup()
