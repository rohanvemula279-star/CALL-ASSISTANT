; Asterisk dialplan — Telugu Assistant (Max)
; This file goes to /etc/asterisk/extensions.d/telugu_assistant.conf
; Include it from extensions.conf via: #include "extensions.d/telugu_assistant.conf"
;
; Flow:
;   1. Answer the call
;   2. Play Telugu greeting (pre-recorded via edge-tts, fetched from FastAPI)
;   3. Record caller's message (silence-terminated, max 30s)
;   4. POST recording to /telugu/voicemail for transcription & notification
;   5. Play goodbye prompt
;   6. Hang up
;
; Prerequisites: wget and curl must be installed inside the Asterisk container.

[globals]
TELUGU_AIAPP_URL=http://app:8000
TELUGU_AIAPP_VOICEMAIL=/telugu/voicemail
TELUGU_AIAPP_DIR=/var/lib/asterisk/ai
TELUGU_GREETING_FILE=telugu_greeting.wav
TELUGU_GREETING_PATH=/var/lib/asterisk/sounds/custom/telugu_greeting.wav

; ================================
;  Telugu Assistant (Max) - Inbound
; ================================
[telugu-assistant-inbound]
exten => s,1,NoOp(Telugu Assistant Max — inbound call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Goto(telugu-assistant,s,1)

[telugu-assistant]
exten => s,1,NoOp(Telugu Assistant Max — greeting + record)
 same => n,Set(CHANNEL(hangup_handler_push)=1)
 ; Fetch the Telugu greeting WAV from the FastAPI server (cached)
 same => n,Set(GREETING_WAV=${TELUGU_GREETING_PATH})
 same => n,GotoIf($[${STAT(e,${GREETING_WAV})}]?play:fetch)
 same => n(fetch),System(wget -q -O ${GREETING_WAV} ${TELUGU_AIAPP_URL}/api/greeting/telugu)
 same => n(play),Playback(custom/telugu_greeting)
 ; Small beep before recording
 same => n,Playback(beep)
 ; Record caller message: up to 30s, silence termination (1.5s)
 same => n,Set(RECORD_ID=${UNIQUEID})
 same => n,Set(RECORD_PATH=${TELUGU_AIAPP_DIR}/telugu_${RECORD_ID}.wav)
 same => n,Record(${RECORD_PATH},0,30,qx,15)
 ; Check if recording was successful
 same => n,GotoIf($["${RECORD_STATUS}" = "ERROR"]?skip)
 ; Post the recording to the FastAPI server for processing
 same => n,System(curl -s -X POST \
   -F "audio=@${RECORD_PATH}" \
   -F "number=${CALLERID(num)}" \
   -F "name=${CALLERID(name)}" \
   -F "call_id=telugu_${RECORD_ID}" \
   ${TELUGU_AIAPP_URL}${TELUGU_AIAPP_VOICEMAIL})
 same => n(skip),Hangup()

exten => h,1,NoOp(Telugu assistant call ended)
 same => n,NoOp(Recording processed and notification sent)

exten => i,1,NoOp(Invalid extension)
 same => n,Playback(invalid)
 same => n,Hangup()

exten => t,1,NoOp(Timeout)
 same => n,Hangup()
