; AMI (Asterisk Manager Interface) - the AGI scripts use this to
; drive the dialplan. Keep this file in /etc/asterisk/manager.conf.
; The AGI scripts run inside the asterisk container and connect via
; localhost.

[general]
enabled=yes
port=5038
bindaddr=127.0.0.1
allowmultiplelogin=yes

[rohan-ai]
secret=CHANGEME_AMI_PASSWORD
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.0
read=all
write=all
writetimeout=5000
