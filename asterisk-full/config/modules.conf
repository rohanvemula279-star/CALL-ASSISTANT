; Auto-load only the modules we need for the AI voice assistant.
; Placed in /etc/asterisk/modules.conf.

[modules]
autoload=yes
noload = pbx_gtkconsole.so
noload = pbx_kdeconsole.so
noload = chan_alsa.so
noload = chan_console.so
noload = chan_phone.so
noload = res_calendar.so
noload = res_config_pgsql.so
noload = res_config_odbc.so
noload = res_config_sqlite.so
noload = cel_custom.so
noload = cel_pgsql.so
noload = cel_radius.so
noload = cel_sqlite3.so

; Modules we DO want:
load = pbx_config.so
load = chan_pjsip.so
load = chan_local.so
load = res_rtp_asterisk.so
load = res_pjsip.so
load = res_pjsip_session.so
load = app_dial.so
load = app_record.so
load = app_playback.so
load = app_controlplayback.so
load = app_system.so
load = app_set.so
load = app_verbose.so
load = app_goto.so
load = app_wait.so
load = app_hangup.so
load = app_agi.so
load = func_shell.so
load = res_agi.so
load = res_odbc.so
load = res_speech.so
load = cdr_csv.so
load = cel.so
load = manager.so
load = res_manager.so
load = cdr_manager.so
load = codec_ulaw.so
load = codec_alaw.so
load = codec_g722.so
load = codec_opus.so
