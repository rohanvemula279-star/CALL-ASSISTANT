# Asterisk telephony configuration for the AI Phone Assistant
#
# Mount this whole directory at /etc/asterisk/ in your container or VM.
# See docker/Dockerfile for how it's wired in.
#
# Files:
#   pjsip.conf          SIP endpoints (the trunk, your softphone, the AI bridge)
#   extensions.conf     Dialplan (where calls go, AGI invocations)
#   manager.conf        AMI credentials used by the AGI scripts
#   modules.conf        Auto-loads the modules we actually need
#   voicemail.conf      Stub - no voicemail in this build
#
# Call flow:
#   Caller --> SIP trunk (or softphone)
#      --> PJSIP endpoint rohan-ai
#      --> [ai-inbound] extension
#      --> AGI: /usr/local/bin/ai_agi.sh  (transcribe -> chat -> speak)
#      --> AGI: /usr/local/bin/playback.sh (play returned WAV)
#
# The AGI scripts call back into the FastAPI server (host=app:8000) using
# curl, so the same /transcribe, /chat, /speak endpoints handle the AI leg.

[global]
type=global
endpoint_identifier_order=ip
debug=yes

[system]
type=system
timer_t1=500
timer_b=32000
compact_headers=yes
disable_multi_domain=yes
max_initial_qualify_time=4

# ---- Transports -----------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
external_media_address=PUBLIC_IP
external_signaling_address=PUBLIC_IP
allow_reload=yes

# ---- AORs ------------------------------------------------------------------
# Caller's softphone (e.g., Linphone on your laptop)
[rohan-phone]
type=aor
max_contacts=1
remove_existing=yes

# The AI bridge — fixed contact, no registration
[ai-bridge]
type=aor
contact=sip:ai@127.0.0.1:5070
max_contacts=1
remove_existing=yes

# ---- Auth -----------------------------------------------------------------
[rohan-phone-auth]
type=auth
auth_type=userpass
username=rohan
password=CHANGEME_PHONE_PASSWORD

# ---- Endpoints ------------------------------------------------------------
[rohan-phone]
type=endpoint
context=ai-inbound
allow=ulaw,alaw,opus,g722,h264
aors=rohan-phone
auth=rohan-phone-auth
callerid="Rohan" <+15551234567>
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=auto

[rohan-phone]
type=identify
endpoint=rohan-phone
match=YOUR_LAPTOP_IP

# The AI "trunk" — receives media forwarded by the dialplan
[ai-bridge]
type=endpoint
context=ai-outbound
allow=ulaw,alaw,opus,g722
aors=ai-bridge
callerid="AI Assistant" <+10000000000>
direct_media=no
dtmf_mode=auto
