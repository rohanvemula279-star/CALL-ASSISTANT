; Asterisk dialplan — AI Phone Assistant
; Place under: asterisk/extensions.conf
;
; Caller -> SIP channel -> bridge to FastAPI HTTP service for ASR/TTS/Chat

[general]
static=yes
writeprotect=no

[globals]
AIAPP_URL=http://app:8000

[ai-inbound]
exten => s,1,NoOp(Inbound call from ${CALLERID(num)})
 same => n,Set(CHANNEL(language)=en)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Goto(ai-prompt,s,1)

[ai-prompt]
exten => s,1,NoOp(Start AI greeting)
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Background(ai-greeting)
 same => n,WaitExten(8)
 same => n,Goto(ai-loop,s,1)

[ai-loop]
exten => s,1,NoOp(Record caller)
 same => n,Record(ai-recordings/${UNIQUEID}.wav,0,5,qx)
 same => n,System(curl -s -X POST -F "audio=@ai-recordings/${UNIQUEID}.wav" ${AIAPP_URL}/transcribe)
 same => n,Goto(ai-loop,s,1)

exten => i,1,Goto(ai-loop,s,1)
exten => t,1,Playback(goodbye)
exten => t,n,Hangup()

exten => 0,1,Playback(goodbye)
exten => 0,n,Hangup()

[ai-conversation]
; Reserved for a more advanced flow: pass audio -> POST /transcribe ->
; POST /chat -> POST /speak -> Playback the returned audio URL.
